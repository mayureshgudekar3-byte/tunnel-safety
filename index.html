<!DOCTYPE html>
<html>
<head>
<title>AI Tunnel Safety System</title>

<style>
body{
font-family:Arial;
background:#0f172a;
color:white;
text-align:center;
}

h1{
color:#38bdf8;
}

.container{
width:70%;
margin:auto;
background:#1e293b;
padding:30px;
border-radius:10px;
}

button{
padding:10px 20px;
background:#38bdf8;
border:none;
cursor:pointer;
margin-top:15px;
}

.result{
font-size:22px;
margin-top:20px;
}

.safe{color:lightgreen;}
.warning{color:orange;}
.danger{color:red;}

table{
margin:auto;
margin-top:20px;
border-collapse:collapse;
}

td,th{
padding:8px;
border:1px solid gray;
}
</style>
</head>

<body>

<h1>AI Driven Smart Tunneling and Underground Safety System</h1>
<h2>Tunnel Collapse Prediction Dashboard</h2>

<div class="container">

<button onclick="loadData()">Load Tunnel Data</button>

<table>
<tr>
<th>Vibration</th>
<th>Pressure</th>
<th>Gas</th>
<th>Water</th>
<th>Displacement</th>
</tr>

<tr>
<td id="v"></td>
<td id="p"></td>
<td id="g"></td>
<td id="w"></td>
<td id="d"></td>
</tr>
</table>

<p id="score"></p>
<p id="result" class="result"></p>

</div>

<script>

async function loadData(){

let response = await fetch("tunnel_data.csv");
let text = await response.text();

let rows = text.split("\n").slice(1);
let randomRow = rows[Math.floor(Math.random()*rows.length)];

let data = randomRow.split(",");

let vibration = Number(data[0]);
let pressure = Number(data[1]);
let gas = Number(data[2]);
let water = Number(data[3]);
let displacement = Number(data[4]);

document.getElementById("v").innerHTML = vibration;
document.getElementById("p").innerHTML = pressure;
document.getElementById("g").innerHTML = gas;
document.getElementById("w").innerHTML = water;
document.getElementById("d").innerHTML = displacement;

let risk = (vibration*10) + (pressure/5) + (gas*20) + (water*5) + (displacement*15);

document.getElementById("score").innerHTML = "Risk Score: " + risk.toFixed(2);

let result = document.getElementById("result");

if(risk < 50){
result.innerHTML="Tunnel Status: SAFE";
result.className="result safe";
}
else if(risk < 80){
result.innerHTML="Tunnel Status: WARNING – Monitor Conditions";
result.className="result warning";
}
else{
result.innerHTML="Tunnel Status: HIGH COLLAPSE RISK";
result.className="result danger";
}

}

</script>

</body>
</html>
