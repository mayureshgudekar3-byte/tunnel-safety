<!DOCTYPE html>
<html>
<head>
<title>AI Tunnel Safety System</title>

<style>

body{
font-family: Arial;
background:#0f172a;
color:white;
text-align:center;
}

h1{
color:#38bdf8;
}

.dashboard{
display:grid;
grid-template-columns:repeat(3,1fr);
gap:20px;
padding:20px;
}

.card{
background:#1e293b;
padding:20px;
border-radius:10px;
}

.tunnel{
width:80%;
height:120px;
background:#374151;
margin:auto;
border-radius:60px;
position:relative;
}

.sensor{
width:20px;
height:20px;
background:red;
border-radius:50%;
position:absolute;
top:50px;
}

.s1{left:15%;}
.s2{left:40%;}
.s3{left:65%;}

.safe{color:lightgreen;}
.warning{color:orange;}
.danger{color:red;}

</style>
</head>

<body>

<h1>AI Driven Smart Tunneling and Underground Safety System</h1>
<h2>Tunnel Collapse Prediction Dashboard</h2>

<div class="tunnel">
<div class="sensor s1"></div>
<div class="sensor s2"></div>
<div class="sensor s3"></div>
</div>

<div class="dashboard">

<div class="card">
<h3>Ground Vibration</h3>
<p id="vibration">2.1 mm/s</p>
</div>

<div class="card">
<h3>Rock Pressure</h3>
<p id="pressure">160 kPa</p>
</div>

<div class="card">
<h3>Methane Gas</h3>
<p id="gas">1.2%</p>
</div>

<div class="card">
<h3>Water Seepage</h3>
<p id="water">Low</p>
</div>

<div class="card">
<h3>AI Prediction</h3>
<p id="status" class="safe">SAFE</p>
</div>

</div>

<script>

function predict(){

let vibration=Math.random()*5;
let pressure=150+Math.random()*100;
let gas=Math.random()*3;

document.getElementById("vibration").innerHTML=vibration.toFixed(2)+" mm/s";
document.getElementById("pressure").innerHTML=pressure.toFixed(0)+" kPa";
document.getElementById("gas").innerHTML=gas.toFixed(2)+" %";

let risk=(vibration*10)+(gas*20)+(pressure/10);

let status=document.getElementById("status");

if(risk<50){
status.innerHTML="SAFE";
status.className="safe";
}
else if(risk<80){
status.innerHTML="WARNING";
status.className="warning";
}
else{
status.innerHTML="HIGH COLLAPSE RISK";
status.className="danger";
}

}

setInterval(predict,3000);

</script>

</body>
</html>
